{{ define "admin_product_edit" }}
<div class="container mt-5">
    <div class="card shadow-sm border-0">
        <div class="card-body p-4">
            <h2 class="fw-bold mb-4">Editar Producto: {{ .product.Name }}</h2>
            
            <form method="POST" action="/view/admin/product/{{ .product.ID }}">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Nombre</label>
                        <input type="text" name="name" value="{{.product.Name}}" class="form-control" required>
                    </div>
                    
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Precio ($)</label>
                        <input type="number" step="0.01" name="price" value="{{.product.Price}}" class="form-control" required>
                    </div>

                    <div class="col-12">
                        <label class="form-label fw-bold">Descripción</label>
                        <textarea name="description" class="form-control" rows="3">{{ .product.Description }}</textarea>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-bold">Stock Actual</label>
                        <input type="number" name="stock" value="{{ .product.Stock }}" class="form-control" required>
                    </div>
                    
                    <div class="col-12 mt-4 text-end">
                        <a href="/admin/view/products" class="btn btn-light px-4 me-2 border">Cancelar</a>
                        <button type="submit" class="btn btn-primary px-4 shadow-sm">
                            <i class="bi bi-save me-1"></i> Guardar Cambios
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
{{ end }}
